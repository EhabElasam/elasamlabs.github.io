<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - Elasam Labs">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            text-align: center;
        }
        
        .error-content {
            max-width: 600px;
        }
        
        .error-code {
            font-size: var(--font-size-6xl);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-md);
        }
        
        .error-title {
            font-size: var(--font-size-3xl);
            margin-bottom: var(--spacing-md);
            color: var(--text-primary);
        }
        
        .error-description {
            font-size: var(--font-size-lg);
            color: var(--text-secondary);
            margin-bottom: var(--spacing-2xl);
            line-height: 1.8;
        }
        
        .error-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="container">
            <div class="nav-wrapper">
                <a href="/" class="logo" aria-label="Elasam Labs Home">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">Elasam Labs</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="error-container">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-description">Sorry, the page you're looking for doesn't exist. It might have been moved or deleted.</p>
            
            <div class="error-actions">
                <a href="/" class="btn btn-primary">Go Home</a>
                <a href="/#apps" class="btn btn-secondary">View Apps</a>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
